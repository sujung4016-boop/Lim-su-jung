<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIM MIRAE | AI Marketer Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
    <style>
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
        }

        .hero-content {
            z-index: 10;
            width: 60%;
        }

        .hero-image {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 45%;
            z-index: 5;
            filter: grayscale(20%);
            transition: filter 0.5s;
        }

        .hero-image:hover {
            filter: grayscale(0%);
        }

        .hero-image img {
            width: 100%;
            border-radius: 30px 0 0 30px;
            box-shadow: -20px 20px 60px rgba(0,0,0,0.5);
        }

        .label {
            color: var(--point-color);
            font-weight: 700;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 4rem;
            line-height: 1.2;
            margin-bottom: 30px;
        }

        .typed-cursor {
            color: var(--point-color);
        }

        /* 배경 애니메이션 요소 */
        .bg-circle {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(222, 255, 154, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }
    </style>
</head>
<body>

    <div class="bg-circle"></div>

    <nav>
        <div class="logo">KIM MIRAE</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="works.html">Works</a>
        </div>
    </nav>

    <section class="hero container">
        <div class="hero-content">
            <span class="label">AI HYBRID MARKETER</span>
            <h1>
                <span id="typing"></span>
            </h1>
            <p style="color: var(--text-sub); font-size: 1.2rem; margin-bottom: 40px;">
                27세, 김미래입니다. <br>
                단순한 마케팅을 넘어, 최신 AI 기술을 비즈니스 워크플로우에 <br>
                녹여내어 실질적인 성과를 만들어냅니다. 
            </p>
            <a href="about.html" class="btn-point">나의 역량 확인하기</a>
        </div>
        
        <div class="hero-image">
            <img src="kim-mirae.png" alt="김미래 마케터">
        </div>
    </section>

    <script>
        // 타이핑 효과 설정
        var typed = new Typed('#typing', {
            strings: ['데이터로 읽고,', 'AI로 실행하는', '하이브리드 인재.'],
            typeSpeed: 60,
            backSpeed: 30,
            loop: true
        });
    </script>
</body>
</html>
